name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'android/**'
      - '.github/workflows/android-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --onefile --name expensebot bot.py

      - name: Prepare DEB package
        run: |
          mkdir -p package/DEBIAN
          mkdir -p package/usr/bin
          mkdir -p package/lib/systemd/system
          
          # Копируем бинарник
          cp dist/expensebot package/usr/bin/
          chmod +x package/usr/bin/expensebot
          
          # Создаем control файл
          cat <<EOF > package/DEBIAN/control
          Package: expensebot
          Version: 1.1.0
          Section: base
          Priority: optional
          Architecture: amd64
          Maintainer: GitHub Actions <noreply@github.com>
          Description: AI-powered Telegram Expense Tracker Bot
          EOF
          
          # Создаем systemd сервис
          cat <<EOF > package/lib/systemd/system/expensebot.service
          [Unit]
          Description=Expense Tracker Telegram Bot
          After=network.target

          [Service]
          User=root
          WorkingDirectory=/usr/bin
          ExecStart=/usr/bin/expensebot
          Restart=always

          [Install]
          WantedBy=multi-user.target
          EOF
          
          dpkg-deb --build package expensebot_1.1.0_amd64.deb

      - name: Upload DEB to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.1.0
          files: expensebot_1.1.0_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --onefile --name ExpenseBot bot.py

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.1.0
          files: dist/ExpenseBot.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
