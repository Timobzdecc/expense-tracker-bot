name: Android Release Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
            java-version: '17'
            distribution: 'temurin'
            cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get Commit Count
        id: vars
        run: echo "commit_count=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        working-directory: ${{ github.workspace }}

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_STORE_FILE_BASE64 }}" | base64 --decode > release.keystore
        working-directory: ./android/app

      - name: Build Release APK
        run: ./gradlew assembleRelease -PversionCode=49 -PversionName="1.0.3"
        env:
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          tag_name: "android-v49"
          name: "Android Release 1.0.3 (49)"
          body: "Эта версия ставится на чистую, с удалением старой из-за смены подписи на релизную.\n\n[Все релизы на GitHub](https://github.com/Timobzdecc/expense-tracker-bot/releases)"
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
