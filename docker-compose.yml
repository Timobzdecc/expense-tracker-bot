version: '3.8'

services:
  xray:
    image: teddysun/xray
    container_name: xray_tunnel
    restart: unless-stopped
    volumes:
      - ./xray_config.json:/etc/xray/config.json

  bot:
    build: .
    container_name: expense_tracker_bot
    restart: unless-stopped
    depends_on:
      - xray
    volumes:
      - ./expenses.db:/app/expenses.db
    env_file:
      - .env
